<!DOCTYPE html>
<html lang="en">
<head>
    <!-- --< The Freshness Guard — A manual food waste reduction app >-- -->
    <!-- --< No AI. No predictions. 100% user-inputted data. >-- -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="The Freshness Guard — Track your food, reduce waste, save money. No AI, just smart logic.">
    <meta name="theme-color" content="#0a0a0f">
    <title>Freshness Guard — Food Waste Tracker</title>

    <!-- --< Fonts >-- -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- --< QuaggaJS for barcode scanning >-- -->
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js" defer></script>

    <!-- --< App Styles >-- -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="app-container">

        <!-- --< ====== TOP HEADER ====== >-- -->
        <header class="app-header">
            <div class="app-logo">
                <div class="logo-icon">🛡️</div>
                <h1>Freshness Guard</h1>
            </div>
            <div class="header-actions">
                <button class="header-btn" id="notif-btn" title="Notifications">
                    🔔
                    <span class="notification-badge" id="notif-badge" style="display: none;">0</span>
                </button>
            </div>
        </header>


        <!-- --< ====== MAIN CONTENT ====== >-- -->
        <main class="main-content">

            <!-- --< Dashboard Tab >-- -->
            <div id="tab-dashboard" class="tab-content active">
                <div class="empty-state">
                    <div class="empty-icon">⏳</div>
                    <div class="empty-title">Loading...</div>
                </div>
            </div>

            <!-- --< History Tab >-- -->
            <div id="tab-history" class="tab-content">
            </div>

            <!-- --< Shopping List Tab >-- -->
            <div id="tab-shopping" class="tab-content">
            </div>

            <!-- --< Donation Map Tab >-- -->
            <div id="tab-donate" class="tab-content">
            </div>

            <!-- --< Settings Tab >-- -->
            <div id="tab-settings" class="tab-content">
            </div>

        </main>


        <!-- --< ====== FAB (ADD ITEM) ====== >-- -->
        <button class="fab" title="Add item">+</button>


        <!-- --< ====== BOTTOM NAVIGATION ====== >-- -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-tab="dashboard">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Fridge</span>
            </button>
            <button class="nav-item" data-tab="history">
                <span class="nav-icon">📊</span>
                <span class="nav-label">History</span>
            </button>
            <button class="nav-item" data-tab="shopping">
                <span class="nav-icon">🛒</span>
                <span class="nav-label">Shop</span>
            </button>
            <button class="nav-item" data-tab="donate">
                <span class="nav-icon">💚</span>
                <span class="nav-label">Donate</span>
            </button>
            <button class="nav-item" data-tab="settings">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">Settings</span>
            </button>
        </nav>

    </div>


    <!-- --< ====== ADD ITEM MODAL ====== >-- -->
    <div class="modal-overlay" id="add-modal">
        <div class="modal-content">
            <div class="modal-handle"></div>
            <div class="modal-title">Add Item</div>

            <!-- --< Barcode Scanner >-- -->
            <button class="scan-btn" onclick="toggleScanner()">
                📷 Scan Barcode
            </button>

            <div class="scanner-container" id="scanner-container">
                <div id="scanner-viewport"></div>
                <div class="scanner-line"></div>
            </div>

            <!-- --< Product Name >-- -->
            <div class="form-group">
                <label class="form-label" for="item-name">Product Name</label>
                <input type="text" class="form-input" id="item-name" placeholder="e.g. Whole Milk" autocomplete="off">
            </div>

            <!-- --< Hidden Barcode Field >-- -->
            <input type="hidden" id="item-barcode">

            <!-- --< Expiration Date — Quick Add Buttons >-- -->
            <div class="form-group">
                <label class="form-label">Expiration Date</label>
                <div class="quick-add-dates">
                    <button class="quick-date-btn" onclick="selectQuickDate(3, this)">
                        <span class="days">+3</span>
                        <span class="label">days</span>
                    </button>
                    <button class="quick-date-btn" onclick="selectQuickDate(7, this)">
                        <span class="days">+7</span>
                        <span class="label">days</span>
                    </button>
                    <button class="quick-date-btn" onclick="selectQuickDate(14, this)">
                        <span class="days">+14</span>
                        <span class="label">days</span>
                    </button>
                </div>
                <div class="date-divider">or pick a date</div>
                <input type="date" class="form-input" id="item-expiry-date">
            </div>

            <!-- --< Category >-- -->
            <div class="form-group">
                <label class="form-label" for="item-category">Category</label>
                <select class="form-input" id="item-category">
                    <option value="General">General</option>
                    <option value="Dairy">🥛 Dairy</option>
                    <option value="Meat">🥩 Meat</option>
                    <option value="Produce">🥬 Produce</option>
                    <option value="Fruit">🍎 Fruit</option>
                    <option value="Bakery">🍞 Bakery</option>
                    <option value="Frozen">🧊 Frozen</option>
                    <option value="Beverage">🥤 Beverage</option>
                    <option value="Snack">🍿 Snack</option>
                    <option value="Condiment">🧂 Condiment</option>
                    <option value="Seafood">🐟 Seafood</option>
                    <option value="Deli">🧀 Deli</option>
                </select>
            </div>

            <!-- --< Submit >-- -->
            <button class="submit-btn" onclick="submitItem()">Add to Fridge</button>
        </div>
    </div>


    <!-- --< ====== NOTIFICATIONS PANEL ====== >-- -->
    <div class="notifications-panel" id="notif-panel">
        <div class="notif-header">
            <h2>🔔 Notifications</h2>
            <button class="notif-close" id="notif-panel-close">✕</button>
        </div>
        <div class="notif-list" id="notif-list">
        </div>
    </div>


    <!-- --< ====== TOAST CONTAINER ====== >-- -->
    <div class="toast-container" id="toast-container"></div>


    <!-- --< App Script >-- -->
    <script src="/js/app.js"></script>

</body>
</html>
